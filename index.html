<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>匿名的砌砖人 / The Anonymous Bricklayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      width: 100%;
    }
    header h1 {
      font-size: 1.5rem;
      color: #c9a84c;
      margin-bottom: 0.25rem;
    }
    header p {
      font-size: 0.9rem;
      color: #888;
    }
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }
    .scene {
      width: 100%;
      text-align: center;
      padding: 1.5rem;
    }
    .scene-title {
      font-size: 1.2rem;
      color: #c9a84c;
      margin-bottom: 1rem;
    }
    .scene-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #bbb;
      margin-bottom: 1.5rem;
    }
    .action-btn {
      display: inline-block;
      min-width: 200px;
      min-height: 48px;
      padding: 12px 24px;
      margin: 6px;
      font-size: 1rem;
      color: #1a1a2e;
      background: #c9a84c;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active {
      background: #b08d3a;
      transform: scale(0.97);
    }
    #game-area {
      width: 100%;
      min-height: 200px;
      background: #16213e;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #status-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem;
      font-size: 0.85rem;
      color: #888;
    }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>匿名的砌砖人</h1>
    <p>The Anonymous Bricklayer</p>
  </header>

  <div id="app">
    <div class="scene" id="scene">
      <div class="scene-title" id="scene-title">巴别的阴影</div>
      <div class="scene-text" id="scene-text">你在巴别塔的阴影下，手中握着第一块砖。言语已经混乱，但砌砖的工作仍在继续。</div>
    </div>

    <div id="game-area">
      <canvas id="canvas" width="360" height="200"></canvas>
    </div>

    <div id="status-bar">
      <span id="stat-shift">班次: --</span>
      <span id="stat-grace">恩典: --</span>
      <span id="stat-brick">砖块: --</span>
    </div>

    <div id="actions">
      <button class="action-btn" id="btn-start" role="button">开始砌砖</button>
    </div>
  </div>

  <footer>神学微游戏 &middot; Anonymous Bricklayer</footer>

  <script src="js/main.js"></script>
</body>
</html>
